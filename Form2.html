<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
</head>
<body bgcolor="#D3D3D3">

<h2 align="center">USER FORM</h2>

<form>
<table border="0" bgcolor="#32CD32"  align="center">
    <tr>
        <td>FIRST NAME</td>
        <td><input type="text"></td>
    </tr>

    <tr>
        <td>PASSWORD</td>
        <td><input type="password"></td>
    </tr>

    <tr>
        <td>GENDER</td>
        <td>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </td>
    </tr>

    <tr>
        <td>ADDRESS</td>
        <td><textarea rows="4" cols="25"></textarea></td>
    </tr>

    <tr>
        <td>D.O.B</td>
        <td><input type="date"></td>
    </tr>

    <tr>
        <td>SELECT GAMES</td>
        <td>
            <input type="checkbox"> Hockey
            <input type="checkbox"> Football
            <input type="checkbox"> Cricket
            <input type="checkbox"> Volleyball
        </td>
    </tr>

    <tr>
        <td>MARITAL STATUS</td>
        <td>
            <input type="radio" name="status"> Married
            <input type="radio" name="status"> Unmarried
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <input type="checkbox"> I accept this agreement
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </td>
    </tr>
</table>
</form>

</body>
</html>
